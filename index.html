l<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jaztine & Mary Ven</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Montserrat,sans-serif;
background:#faf7f3;
overflow-x:hidden;
}

.hero{

height:100vh;

background:url("hero.jpg") center center/cover no-repeat;

position:relative;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

color:white;

}

.hero::before{

content:"";

position:absolute;

inset:0;

background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45));

backdrop-filter:blur(2px);

}

.content{

position:relative;

z-index:2;

animation:fadeUp 2s ease;

padding:20px;

}

.invite{

letter-spacing:4px;

font-size:.8rem;

text-transform:uppercase;

margin-bottom:20px;

}

h1{

font-family:"Alex Brush",cursive;

font-size:6rem;

line-height:1;

margin-bottom:20px;

}

.date{

font-size:1.2rem;

letter-spacing:3px;

margin-bottom:35px;

}

.button{

display:inline-block;

padding:15px 40px;

background:rgba(255,255,255,.18);

border:1px solid rgba(255,255,255,.4);

backdrop-filter:blur(15px);

border-radius:50px;

color:white;

text-decoration:none;

transition:.3s;

}

.button:hover{

background:white;

color:black;

}

.scroll{

position:absolute;

bottom:30px;

left:50%;

transform:translateX(-50%);

font-size:2rem;

animation:bounce 2s infinite;

z-index:5;

color:white;

}

.gallery{

padding:100px 20px;

max-width:1000px;

margin:auto;

text-align:center;

}

.gallery h2{

font-size:2rem;

margin-bottom:50px;

color:#123A26;

}

.gallery img{

width:100%;

max-width:700px;

border-radius:25px;

box-shadow:0 20px 40px rgba(0,0,0,.15);

transition:.5s;

}

.gallery img:hover{

transform:scale(1.02);

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(50px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@keyframes bounce{

0%,100%{

transform:translate(-50%,0);

}

50%{

transform:translate(-50%,10px);

}

}

@media(max-width:768px){

h1{

font-size:4rem;

}

.date{

font-size:1rem;

}

}

</style>

</head>

<body>

<section class="hero">

<div class="content">

<p class="invite">

Together with our Families

</p>

<h1>

Jaztine

<br>

&

<br>

Mary Ven

</h1>

<p class="date">

December 21, 2026

</p>

<a href="#gallery" class="button">

View Invitation

</a>

</div>

<div class="scroll">

↓

</div>

</section>

<section class="gallery" id="gallery">

<h2>

Our Love Story

</h2>

<img src="photo1.jpg" alt="Jaztine and Mary Ven">

</section>

</body>

</html>
