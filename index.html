<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jaztine & Mary Ven | Wedding Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

--green:#123A26;
--green-dark:#0D281A;
--beige:#D4C5B9;
--champagne:#F7F3EE;
--burgundy:#800020;
--white:#ffffff;
--shadow:0 20px 50px rgba(0,0,0,.18);

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:Montserrat,sans-serif;
background:var(--champagne);
overflow-x:hidden;

}

/* ---------------- NAVIGATION ---------------- */

nav{

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);

width:min(92%,1100px);

padding:16px 30px;

display:flex;

justify-content:space-between;

align-items:center;

border-radius:60px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.25);

z-index:1000;

transition:.35s;

}

nav.scrolled{

background:rgba(18,58,38,.85);

}

.logo{

font-family:"Alex Brush",cursive;

font-size:2rem;

color:white;

}

nav ul{

display:flex;

list-style:none;

gap:35px;

}

nav a{

color:white;

text-decoration:none;

font-weight:500;

position:relative;

}

nav a::after{

content:"";

position:absolute;

left:0;

bottom:-6px;

width:0;

height:2px;

background:white;

transition:.3s;

}

nav a:hover::after{

width:100%;

}

/* ---------------- HERO ---------------- */

.hero{

height:100vh;

position:relative;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

overflow:hidden;

background:url("hero.jpg") center center/cover no-repeat;

animation:heroZoom 22s linear infinite alternate;

}

.hero::before{

content:"";

position:absolute;

inset:0;

background:
linear-gradient(rgba(0,0,0,.35),
rgba(0,0,0,.55));

}

.hero::after{

content:"";

position:absolute;

inset:0;

background:
radial-gradient(circle at top left,
rgba(255,255,255,.12),
transparent 40%),

radial-gradient(circle at bottom right,
rgba(255,255,255,.08),
transparent 35%);

}

.hero-content{

position:relative;

z-index:5;

color:white;

padding:25px;

width:min(90%,800px);

animation:fadeUp 1.5s ease;

transform:translateY(-45px);

}

.invite{

font-size:.8rem;

letter-spacing:4px;

text-transform:uppercase;

margin-bottom:20px;

opacity:.95;

}

.hero h1{

font-family:"Alex Brush",cursive;

font-size:6.3rem;

line-height:.9;

margin-bottom:20px;

text-shadow:0 5px 25px rgba(0,0,0,.35);

}

.hero h1 span{

display:block;

font-size:3rem;

margin:18px 0;

}

.date{

font-size:1.05rem;

letter-spacing:3px;

margin-bottom:35px;

opacity:.95;

}

/* ---------------- BUTTON ---------------- */

.hero-btn{

display:inline-flex;

align-items:center;

gap:12px;

padding:16px 42px;

border-radius:60px;

text-decoration:none;

font-weight:600;

color:white;

background:rgba(255,255,255,.12);

border:1px solid rgba(255,255,255,.25);

backdrop-filter:blur(18px);

transition:.35s;

}

.hero-btn:hover{

transform:translateY(-3px);

background:white;

color:#222;

}

/* ---------------- SCROLL ---------------- */

.scroll{

position:absolute;

bottom:35px;

left:50%;

transform:translateX(-50%);

color:white;

font-size:2rem;

animation:bounce 2s infinite;

z-index:5;

}

/* ---------------- COUNTDOWN ---------------- */

.countdown{

margin-top:45px;

display:grid;

grid-template-columns:repeat(4,1fr);

gap:15px;

}

.count-box{

background:rgba(255,255,255,.12);

border:1px solid rgba(255,255,255,.18);

backdrop-filter:blur(18px);

padding:18px;

border-radius:18px;

}

.count-box h2{

font-size:2rem;

font-weight:700;

}

.count-box p{

font-size:.75rem;

letter-spacing:2px;

text-transform:uppercase;

margin-top:5px;

}

/* ---------------- ANIMATIONS ---------------- */

@keyframes heroZoom{

from{

transform:scale(1);

}

to{

transform:scale(1.08);

}

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(-45px);

}

}

@keyframes bounce{

0%,100%{

transform:translate(-50%,0);

}

50%{

transform:translate(-50%,10px);

}

}

/* ---------------- MOBILE ---------------- */

@media(max-width:768px){

nav{

padding:15px 20px;

}

nav ul{

display:none;

}

.hero h1{

font-size:4.2rem;

}

.hero h1 span{

font-size:2rem;

}

.countdown{

grid-template-columns:repeat(2,1fr);

}

.hero-content{

transform:translateY(-20px);

}

}

</style>
</head>

<body>

<nav>

<div class="logo">

J & M

</div>

<ul>

<li><a href="#">Home</a></li>

<li><a href="#">Details</a></li>

<li><a href="#">Gallery</a></li>

<li><a href="#">RSVP</a></li>

</ul>

</nav>

<section class="hero">

<div class="hero-content">

<p class="invite">

Together with our Families

</p>

<h1>

Jaztine

<span>&</span>

Mary Ven

</h1>

<p class="date">

December 21, 2026 • 3:00 PM

</p>

<a href="#details" class="hero-btn">

♡ View Invitation

</a>

<div class="countdown">

<div class="count-box">

<h2 id="days">000</h2>

<p>Days</p>

</div>

<div class="count-box">

<h2 id="hours">00</h2>

<p>Hours</p>

</div>

<div class="count-box">

<h2 id="minutes">00</h2>

<p>Minutes</p>

</div>

<div class="count-box">

<h2 id="seconds">00</h2>

<p>Seconds</p>

</div>

</div>

</div>

<div class="scroll">

↓

</div>

</section>

<script>

const wedding = new Date("December 21, 2026 15:00:00").getTime();

setInterval(()=>{

const now = new Date().getTime();

const gap = wedding-now;

const days=Math.floor(gap/(1000*60*60*24));

const hours=Math.floor((gap%(1000*60*60*24))/(1000*60*60));

const minutes=Math.floor((gap%(1000*60*60))/(1000*60));

const seconds=Math.floor((gap%(1000*60))/1000);

document.getElementById("days").innerHTML=days;
document.getElementById("hours").innerHTML=hours;
document.getElementById("minutes").innerHTML=minutes;
document.getElementById("seconds").innerHTML=seconds;

},1000);

window.addEventListener("scroll",()=>{

const nav=document.querySelector("nav");

if(window.scrollY>80){

nav.classList.add("scrolled");

}else{

nav.classList.remove("scrolled");

}

});

</script>

</body>
</html>
